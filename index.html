<!doctype html>
<html lang="en" data-theme="forest">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inchy</title>
    <script>
      // Forest is the product default. Apply it before first paint and overwrite
      // any older saved theme from previous versions.
      (function () {
        try {
          localStorage.setItem("planner-theme", "forest");
          document.documentElement.dataset.theme = "forest";
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/inchy-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SemiCondensed:wght@300;400;500;600&family=Quattrocento:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
